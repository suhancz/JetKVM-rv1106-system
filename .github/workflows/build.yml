name: Build firmware
permissions:
  contents: write

on:
  push:
    branches:
      - dev
      - 'feat/**'
      - 'chore/**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: buildjet-16vcpu-ubuntu-2204
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up build dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            device-tree-compiler \
            gperf g++-multilib gcc-multilib \
            libnl-3-dev libdbus-1-dev libelf-dev libmpc-dev dwarves
      - name: Get build version
        run: |
          export BUILD_VERSION=$(cat VERSION)
          # check if current branch is main, if not then append branch name and commit 
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            export BUILD_VERSION="$BUILD_VERSION-$(echo $GITHUB_REF | sed 's/refs\/heads\///' | sed 's/\//-/')$(date +%Y%m%d%H%M)"
          fi

          echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
      - name: Build
        run: |
          echo "Version: $BUILD_VERSION"

          ./update_app.sh
          ./build.sh lunch BoardConfig_IPC/BoardConfig-EMMC-NONE-RV1106_JETKVM_V2.mk
          ./build.sh
      - name: Upload OTA image
        uses: actions/upload-artifact@v4
        with:
          name: OTA Image
          path: output/image/update_ota.tar
          retention-days: 7
      - name: Upload Full image
        uses: actions/upload-artifact@v4
        with:
          name: Full Image
          path: output/image/update.img
          retention-days: 7
      - name: Create compressed buildkit
        run: |
          tar  "-I zstd -10 -T0 --long=31" -cf \
            buildkit.tar.zst \
            tools/linux/toolchain \
            media/out/include \
            media/out/lib
      - name: Upload buildkit
        uses: actions/upload-artifact@v4
        with:
          name: jetkvm-native-buildkit
          path: buildkit.tar.zst
          retention-days: 7
          compression-level: 0

  release:
    # no need to use buildjet runners, as we only need to create a release
    runs-on: ubuntu-latest
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          # need review before making a real release
          draft: true
          files: |
            ./OTA Image/update_ota.tar
            ./Full Image/update.img
            ./jetkvm-native-buildkit/buildkit.tar.zst
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref }}
          name: ${{ github.ref }}
          generate_release_notes: true
